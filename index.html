<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>for ren 💕</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Nunito:wght@400;500;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root { --rose: #e8637a; --cream: #fff8f5; --text: #5a3030; }
body { min-height: 100vh; font-family: 'Nunito', sans-serif; overflow: hidden; }

.page {
  position: fixed; inset: 0;
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.6s ease;
}
.page.active { display: flex; opacity: 1; }
.page.fade-out { opacity: 0; pointer-events: none; }

/* ===== PAGE 1 — QUESTION ===== */
#page-question {
  background: linear-gradient(160deg, #fce4dc 0%, #f2b5a0 50%, #e8937a 100%);
  overflow: hidden;
}
.confetti-canvas {
  position: absolute; inset: 0; width: 100%; height: 100%;
  pointer-events: none;
}
.question-content {
  position: relative; z-index: 5;
  display: flex; flex-direction: column;
  align-items: center; gap: 32px;
  padding: 20px;
}
.question-text {
  font-family: 'Nunito', sans-serif;
  font-size: 2rem; font-weight: 700;
  color: white;
  text-align: center;
  text-shadow: 0 2px 12px rgba(180,60,60,0.2);
  line-height: 1.3;
}
.btn-yes {
  padding: 16px 52px;
  background: var(--rose);
  color: white; border: none; border-radius: 50px;
  font-size: 1.1rem; font-family: 'Nunito', sans-serif; font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(232,99,122,0.4);
  transition: transform 0.2s, box-shadow 0.2s;
}
.btn-yes:active { transform: scale(0.95); }
.btn-no {
  padding: 12px 36px;
  background: rgba(255,255,255,0.25);
  color: white; border: 2px solid rgba(255,255,255,0.5);
  border-radius: 50px;
  font-size: 1rem; font-family: 'Nunito', sans-serif; font-weight: 600;
  cursor: pointer;
  position: fixed;
  transition: none;
}

/* ===== PAGE 2 — PIN ===== */
#page-pin {
  background: linear-gradient(160deg, #fce4dc 0%, #f2b5a0 50%, #e8937a 100%);
}
.pin-top { text-align: center; margin-bottom: 36px; }
.pin-top .small {
  font-family: 'Nunito', sans-serif; font-size: 1.1rem; font-weight: 500;
  color: rgba(255,255,255,0.9); margin-bottom: 8px;
}
.pin-top .name {
  font-family: 'Dancing Script', cursive; font-size: 3.2rem; font-weight: 700;
  color: white; text-shadow: 0 2px 20px rgba(200,80,80,0.3); line-height: 1;
}
.pin-dots { display: flex; gap: 14px; justify-content: center; margin-bottom: 32px; }
.pin-dot {
  width: 18px; height: 18px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.7); background: transparent;
  transition: background 0.2s, transform 0.15s;
}
.pin-dot.filled { background: white; transform: scale(1.15); }
.pin-keypad { display: grid; grid-template-columns: repeat(3, 72px); gap: 14px; }
.key {
  width: 72px; height: 72px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.6);
  background: rgba(255,255,255,0.15); color: white;
  font-size: 1.4rem; font-family: 'Nunito', sans-serif; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(4px); transition: background 0.15s, transform 0.1s;
  user-select: none;
}
.key:active { background: rgba(255,255,255,0.35); transform: scale(0.92); }
.key.clear { font-size: 0.9rem; }
.key.empty { border: none; background: transparent; cursor: default; pointer-events: none; }
.pin-error { margin-top: 20px; color: white; font-size: 0.9rem; font-weight: 600; opacity: 0; transition: opacity 0.3s; }
.pin-error.show { opacity: 1; }

/* ===== PAGE 3 — LETTER ===== */
#page-letter {
  background: linear-gradient(160deg, #fce4dc 0%, #f2b5a0 50%, #e8937a 100%);
  padding: 24px; overflow-y: auto;
  align-items: center; justify-content: flex-start; padding-top: 40px;
}
.letter-card {
  background: var(--cream); border-radius: 24px;
  padding: 32px 24px 24px; max-width: 420px; width: 100%;
  box-shadow: 0 8px 40px rgba(180,80,80,0.15);
}
.letter-greeting {
  font-family: 'Dancing Script', cursive; font-size: 1.8rem; font-weight: 700;
  color: var(--text); text-align: center; margin-bottom: 16px;
}
.letter-body {
  font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 500;
  color: var(--text); line-height: 1.85; text-align: left;
}
.next-btn {
  display: block; margin: 24px auto 0; padding: 13px 44px;
  background: var(--rose); color: white; border: none; border-radius: 50px;
  font-size: 1rem; font-family: 'Nunito', sans-serif; font-weight: 700;
  cursor: pointer; box-shadow: 0 4px 20px rgba(232,99,122,0.4);
  transition: transform 0.2s;
}
.next-btn:active { transform: scale(0.95); }

/* ===== PAGE 4 — POLAROID ===== */
#page-photo { overflow: hidden; }
.polaroid-bg {
  width: 100%; height: 100%;
  background: linear-gradient(160deg, #fce4dc 0%, #f9c8c0 50%, #f2a8a0 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.polaroid-title {
  font-family: 'Dancing Script', cursive; font-size: 2rem; font-weight: 700;
  color: var(--rose); margin-bottom: 6px; text-align: center; z-index: 5;
}
.polaroid-hint {
  font-family: 'Nunito', sans-serif; font-size: 0.8rem; font-weight: 500;
  color: rgba(90,48,48,0.55); margin-bottom: 32px; text-align: center; z-index: 5;
}
.polaroid-stack { position: relative; width: 240px; height: 280px; z-index: 5; }
.polaroid-card {
  position: absolute; inset: 0; background: white; border-radius: 4px;
  padding: 12px 12px 40px;
  box-shadow: 0 8px 32px rgba(180,80,80,0.18), 0 2px 8px rgba(0,0,0,0.1);
  cursor: grab; user-select: none; transform-origin: center bottom; will-change: transform;
}
.polaroid-card:active { cursor: grabbing; }
.polaroid-card img {
  width: 100%; height: 216px; object-fit: cover;
  display: block; border-radius: 2px; pointer-events: none;
}
.polaroid-card.flying-left { animation: flyLeft 0.4s ease-in forwards; }
.polaroid-card.flying-right { animation: flyRight 0.4s ease-in forwards; }
@keyframes flyLeft { to { transform: translateX(-140vw) rotate(-30deg); opacity: 0; } }
@keyframes flyRight { to { transform: translateX(140vw) rotate(30deg); opacity: 0; } }
.swipe-counter {
  margin-top: 20px; font-family: 'Nunito', sans-serif;
  font-size: 0.85rem; font-weight: 600; color: rgba(90,48,48,0.5); z-index: 5;
}

/* Hearts */
.heart {
  position: fixed; pointer-events: none; z-index: 1;
  animation: floatUp linear forwards;
}
@keyframes floatUp {
  0%   { transform: translateY(0) rotate(0deg); opacity: 0.9; }
  100% { transform: translateY(-110vh) rotate(15deg); opacity: 0; }
}

/* Music btn */
.music-btn {
  position: fixed; bottom: 24px; right: 24px;
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(232,99,122,0.85);
  border: none; color: white; font-size: 1.2rem;
  cursor: pointer; z-index: 999;
  display: none; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(232,99,122,0.4);
  transition: transform 0.2s;
}
.music-btn.visible { display: flex; }
.music-btn:active { transform: scale(0.9); }
</style>
</head>
<body>

<!-- MUSIC -->
<audio id="bgMusic" loop>
  <source src="https://www.youtube.com/watch?v=0KSOMA3QBU0" type="audio/mpeg">
</audio>
<button class="music-btn" id="musicBtn" onclick="toggleMusic()">🎵</button>

<!-- PAGE 1: QUESTION -->
<div class="page active" id="page-question">
  <canvas class="confetti-canvas" id="confettiCanvas"></canvas>
  <div class="question-content">
    <div class="question-text">"I have something 🤍"</div>
    <button class="btn-yes" onclick="goToPin()">Yes! 💕</button>
    <button class="btn-no" id="btnNo" onmouseover="runAway()" ontouchstart="runAway()">No</button>
  </div>
</div>

<!-- PAGE 2: PIN -->
<div class="page" id="page-pin">
  <div class="pin-top">
    <div class="small">I made this website just for u</div>
    <div class="name">"Ren"</div>
  </div>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
    <div class="pin-dot" id="d4"></div><div class="pin-dot" id="d5"></div>
  </div>
  <div class="pin-keypad">
    <div class="key" onclick="pressKey('1')">1</div>
    <div class="key" onclick="pressKey('2')">2</div>
    <div class="key" onclick="pressKey('3')">3</div>
    <div class="key" onclick="pressKey('4')">4</div>
    <div class="key" onclick="pressKey('5')">5</div>
    <div class="key" onclick="pressKey('6')">6</div>
    <div class="key" onclick="pressKey('7')">7</div>
    <div class="key" onclick="pressKey('8')">8</div>
    <div class="key" onclick="pressKey('9')">9</div>
    <div class="key empty"></div>
    <div class="key" onclick="pressKey('0')">0</div>
    <div class="key clear" onclick="clearPin()">CLEAR</div>
  </div>
  <div class="pin-error" id="pin-error">wrong pin 💔</div>
</div>

<!-- PAGE 3: LETTER -->
<div class="page" id="page-letter">
  <div class="letter-card">
    <div class="letter-greeting">Hi Ren,</div>
    <div class="letter-body">
      untuk baikmu, aku berterima kasih,<br>
      untuk salahku, aku minta maaf,<br><br>
      semoga kamu bertemu di titik terbaik,<br>
      semua tentangmu perlahan ku hapus…….
    </div>
    <button class="next-btn" onclick="goToPhoto()">Next? 💕</button>
  </div>
</div>

<!-- PAGE 4: POLAROID -->
<div class="page" id="page-photo">
  <div class="polaroid-bg">
    <div class="polaroid-title">Our Memories 💕</div>
    <div class="polaroid-hint">Tarik &amp; lempar foto untuk melihat!</div>
    <div class="polaroid-stack" id="polaroidStack"></div>
  </div>
</div>

<script>
const photos = [
  'https://raw.githubusercontent.com/GlitchSYSX/backtifriends/main/01edf243-406e-4efb-89bb-866e46fd8fc8.jpeg',
  'https://raw.githubusercontent.com/GlitchSYSX/backtifriends/main/09c6e3b4-25ca-4cfd-8bc3-d99ab7f18464.jpeg',
  'https://raw.githubusercontent.com/GlitchSYSX/backtifriends/main/0A406C68-B124-4E3B-BE3C-F0221EAB7EE3.JPG',
  'https://raw.githubusercontent.com/GlitchSYSX/backtifriends/main/24157dbe-e9c6-4188-927b-8713286686a3.jpeg',
  'https://raw.githubusercontent.com/GlitchSYSX/backtifriends/main/281c19e1-a7e8-401e-a132-9ff1d6aa9e85.jpeg',
  'https://raw.githubusercontent.com/GlitchSYSX/backtifriends/main/367d3de3-1afc-45ca-86db-642ecc0e5405.jpeg',
  'https://raw.githubusercontent.com/GlitchSYSX/backtifriends/main/3a22f3a9-216f-4bf8-a1a4-1a9cf08f5dda.jpeg',
  'https://raw.githubusercontent.com/GlitchSYSX/backtifriends/main/44ff288b-d5f9-4957-afc9-121bacb633a9.jpeg',
  'https://raw.githubusercontent.com/GlitchSYSX/backtifriends/main/4b310e08-cdd3-47b8-a678-c5cf32b557ce.jpeg',
  'https://raw.githubusercontent.com/GlitchSYSX/backtifriends/main/522bad1e-c677-4092-97a9-5ac3c7084dfd.jpeg',
  'https://raw.githubusercontent.com/GlitchSYSX/backtifriends/main/591579e4-6d07-4ff0-8dfd-2daf18ae75e1.jpeg',
  'https://raw.githubusercontent.com/GlitchSYSX/backtifriends/main/5fd9bb6b-bd7a-4f42-9f3f-8de40ec9d1d5.jpeg',
  'https://raw.githubusercontent.com/GlitchSYSX/backtifriends/main/67eceed6-14e5-471c-ad4b-50ac0e598fa6.jpeg',
  'https://raw.githubusercontent.com/GlitchSYSX/backtifriends/main/6CEA7C06-074A-4F6B-BF95-7A9949C3D8D0.JPG',
  'https://raw.githubusercontent.com/GlitchSYSX/backtifriends/main/769435fb-2ca5-4c9d-8f40-7d10c1acc97c.jpeg',
  'https://raw.githubusercontent.com/GlitchSYSX/backtifriends/main/776CA19E-486A-4239-B8E1-7B242091C7E4.JPG',
  'https://raw.githubusercontent.com/GlitchSYSX/backtifriends/main/9a06dece-4128-4c18-ac7c-c14ff693b70b.jpeg',
  'https://raw.githubusercontent.com/GlitchSYSX/backtifriends/main/9a20bbdc-c033-424f-ac1e-10a1b7332700.jpeg',
  'https://raw.githubusercontent.com/GlitchSYSX/backtifriends/main/DFDF7A3E-863C-4BAE-AE09-6F7AA99BBD53.JPG',
  'https://raw.githubusercontent.com/GlitchSYSX/backtifriends/main/F4FBCC57-17F9-42B2-8FAB-7FB6E1348533.JPG',
  'https://raw.githubusercontent.com/GlitchSYSX/backtifriends/main/a5684e61-2804-46dd-bb9e-36d5210e0d3e.jpeg',
  'https://raw.githubusercontent.com/GlitchSYSX/backtifriends/main/aafae3e2-3e73-47df-afab-c717884745b1.jpeg',
  'https://raw.githubusercontent.com/GlitchSYSX/backtifriends/main/b66801e3-fe09-452a-a2f5-8d7bc16e34a4.jpeg',
  'https://raw.githubusercontent.com/GlitchSYSX/backtifriends/main/c2e90e05-5fa5-47d8-b407-8d7e14a622eb.jpeg',
  'https://raw.githubusercontent.com/GlitchSYSX/backtifriends/main/c99152a4-547f-4562-b10a-a2806c414ed0.jpeg',
  'https://raw.githubusercontent.com/GlitchSYSX/backtifriends/main/ca33e528-3676-4dec-85c0-e20fc826801c.jpeg',
  'https://raw.githubusercontent.com/GlitchSYSX/backtifriends/main/df083b49-3a23-4967-bcce-6cf92e133fe3.jpeg',
  'https://raw.githubusercontent.com/GlitchSYSX/backtifriends/main/e6c502f5-d11d-4783-bf30-f0874dbda05c.jpeg',
  'https://raw.githubusercontent.com/GlitchSYSX/backtifriends/main/e9260268-f9e1-457b-bb84-9660a5fd3a2e.jpeg',
  'https://raw.githubusercontent.com/GlitchSYSX/backtifriends/main/efe52e50-011d-49a4-bbb6-475c5a7e6258.jpeg',
];

// ============================================================
// CONFETTI
// ============================================================
const confCanvas = document.getElementById('confettiCanvas');
const confCtx = confCanvas.getContext('2d');
let confetti = [];
let confRunning = true;

function resizeConf() {
  confCanvas.width = window.innerWidth;
  confCanvas.height = window.innerHeight;
}
resizeConf();
window.addEventListener('resize', resizeConf);

const colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#c77dff','#ff9a3c','#ff85a1'];
for (let i = 0; i < 80; i++) {
  confetti.push({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight - window.innerHeight,
    w: 6 + Math.random() * 8, h: 4 + Math.random() * 6,
    color: colors[Math.floor(Math.random() * colors.length)],
    rot: Math.random() * 360, rotSpeed: (Math.random() - 0.5) * 4,
    speed: 1.5 + Math.random() * 2.5, drift: (Math.random() - 0.5) * 1.5
  });
}

function drawConfetti() {
  if (!confRunning) return;
  confCtx.clearRect(0, 0, confCanvas.width, confCanvas.height);
  confetti.forEach(c => {
    c.y += c.speed; c.x += c.drift; c.rot += c.rotSpeed;
    if (c.y > confCanvas.height) { c.y = -10; c.x = Math.random() * confCanvas.width; }
    confCtx.save();
    confCtx.translate(c.x, c.y);
    confCtx.rotate(c.rot * Math.PI / 180);
    confCtx.fillStyle = c.color;
    confCtx.fillRect(-c.w/2, -c.h/2, c.w, c.h);
    confCtx.restore();
  });
  requestAnimationFrame(drawConfetti);
}
drawConfetti();

// ============================================================
// NO BUTTON RUN AWAY
// ============================================================
const btnNo = document.getElementById('btnNo');
let noX = 50, noY = 80;

function runAway() {
  const vw = window.innerWidth - 120;
  const vh = window.innerHeight - 80;
  noX = 20 + Math.random() * vw;
  noY = 20 + Math.random() * vh;
  btnNo.style.left = noX + 'px';
  btnNo.style.top = noY + 'px';
}

// init position
btnNo.style.position = 'fixed';
btnNo.style.left = '50%';
btnNo.style.top = '25%';
btnNo.style.transform = 'translateX(-50%)';

// ============================================================
// MUSIC
// ============================================================
// Using a royalty-free version via a public audio CDN
// Replace src below with your own MP3 uploaded to GitHub
const music = document.getElementById('bgMusic');
// Try YouTube embed audio workaround via proxy
music.src = 'https://raw.githubusercontent.com/GlitchSYSX/backtifriends/main/music.mp3';
let musicPlaying = false;

function toggleMusic() {
  const btn = document.getElementById('musicBtn');
  if (musicPlaying) {
    music.pause();
    btn.textContent = '🎵';
    musicPlaying = false;
  } else {
    music.play().catch(() => {});
    btn.textContent = '⏸';
    musicPlaying = true;
  }
}

function showMusicBtn() {
  document.getElementById('musicBtn').classList.add('visible');
  music.play().catch(() => {});
  musicPlaying = true;
  document.getElementById('musicBtn').textContent = '⏸';
}

// ============================================================
// PAGE TRANSITIONS
// ============================================================
function goToPin() {
  transition('page-question', 'page-pin');
  confRunning = false;
  showMusicBtn();
  spawnHearts();
}

function goToLetter() {
  transition('page-pin', 'page-letter');
}

function goToPhoto() {
  transition('page-letter', 'page-photo');
  initPolaroid();
}

function transition(fromId, toId) {
  const from = document.getElementById(fromId);
  const to = document.getElementById(toId);
  from.classList.add('fade-out');
  setTimeout(() => {
    from.classList.remove('active', 'fade-out');
    to.classList.add('active');
  }, 600);
}

// ============================================================
// PIN
// ============================================================
const CORRECT_PIN = '210705';
let currentPin = '';

function pressKey(num) {
  if (currentPin.length >= 6) return;
  currentPin += num;
  updateDots();
  if (currentPin.length === 6) setTimeout(checkPin, 200);
}
function clearPin() {
  currentPin = '';
  updateDots();
  document.getElementById('pin-error').classList.remove('show');
}
function updateDots() {
  for (let i = 0; i < 6; i++)
    document.getElementById('d' + i).classList.toggle('filled', i < currentPin.length);
}
function checkPin() {
  if (currentPin === CORRECT_PIN) {
    goToLetter();
  } else {
    document.getElementById('pin-error').classList.add('show');
    currentPin = '';
    updateDots();
    setTimeout(() => document.getElementById('pin-error').classList.remove('show'), 1500);
  }
}

// ============================================================
// HEARTS
// ============================================================
function spawnHearts() {
  const emojis = ['💕','💗','💖','✨','🌸','💫','🩷'];
  for (let i = 0; i < 14; i++) {
    setTimeout(() => {
      const h = document.createElement('div');
      h.className = 'heart';
      h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      h.style.left = (5 + Math.random() * 90) + 'vw';
      h.style.bottom = '-30px';
      h.style.fontSize = (0.9 + Math.random() * 1.1) + 'rem';
      const dur = 3 + Math.random() * 4;
      h.style.animationDuration = dur + 's';
      document.body.appendChild(h);
      setTimeout(() => h.remove(), dur * 1000 + 200);
    }, i * 120);
  }
}

// ============================================================
// POLAROID
// ============================================================
let cards = [], currentIdx = 0;
let isDragging = false, startX = 0, startY = 0, currentX = 0;
let activeCard = null, dragMoved = false;

function initPolaroid() {
  const stack = document.getElementById('polaroidStack');
  stack.innerHTML = ''; cards = []; currentIdx = 0;
  [...photos].reverse().forEach((url, i) => {
    const card = document.createElement('div');
    card.className = 'polaroid-card';
    const tilt = (Math.random() - 0.5) * 6;
    const tx = (Math.random() - 0.5) * 8;
    card.style.transform = `rotate(${tilt}deg) translateX(${tx}px)`;
    card.dataset.baseTilt = tilt; card.dataset.baseTx = tx;
    const img = document.createElement('img');
    img.src = url; img.crossOrigin = 'anonymous';
    card.appendChild(img);
    card.addEventListener('mousedown', dragStart);
    card.addEventListener('touchstart', dragStart, { passive: true });
    stack.appendChild(card);
    cards.unshift(card);
  });
  updateCounter(); refreshStackVisuals();
}

function refreshStackVisuals() {
  cards.slice(currentIdx).forEach((card, i) => {
    const tilt = parseFloat(card.dataset.baseTilt) || 0;
    const tx = parseFloat(card.dataset.baseTx) || 0;
    if (i === 0) {
      if (!isDragging) {
        card.style.transform = `rotate(${tilt}deg) translateX(${tx}px)`;
        card.style.transition = 'transform 0.3s ease';
      }
      card.style.zIndex = 50; card.style.opacity = '1';
    } else {
      card.style.transform = `rotate(${tilt + i*2}deg) translateX(${tx + i*3}px) scale(${1 - i*0.02})`;
      card.style.zIndex = 49 - i;
      card.style.opacity = i < 4 ? '1' : '0';
      card.style.transition = 'transform 0.3s ease';
    }
  });
  updateCounter();
}

function dragStart(e) {
  if (currentIdx >= cards.length) return;
  activeCard = cards[currentIdx]; isDragging = true; dragMoved = false;
  const pt = e.touches ? e.touches[0] : e;
  startX = pt.clientX; startY = pt.clientY; currentX = 0;
  activeCard.style.transition = 'none';
  window.addEventListener('mousemove', dragMove);
  window.addEventListener('touchmove', dragMove, { passive: false });
  window.addEventListener('mouseup', dragEnd);
  window.addEventListener('touchend', dragEnd);
}

function dragMove(e) {
  if (!isDragging || !activeCard) return;
  if (e.cancelable) e.preventDefault();
  const pt = e.touches ? e.touches[0] : e;
  currentX = pt.clientX - startX;
  const dy = pt.clientY - startY;
  if (Math.abs(currentX) > 3 || Math.abs(dy) > 3) dragMoved = true;
  const rotate = currentX * 0.08;
  const baseTilt = parseFloat(activeCard.dataset.baseTilt) || 0;
  activeCard.style.transform = `translateX(${currentX}px) translateY(${dy * 0.3}px) rotate(${baseTilt + rotate}deg)`;
}

function dragEnd() {
  window.removeEventListener('mousemove', dragMove);
  window.removeEventListener('touchmove', dragMove);
  window.removeEventListener('mouseup', dragEnd);
  window.removeEventListener('touchend', dragEnd);
  if (!isDragging || !activeCard) return;
  isDragging = false;
  const threshold = window.innerWidth * 0.28;
  if (Math.abs(currentX) > threshold) {
    activeCard.classList.add(currentX > 0 ? 'flying-right' : 'flying-left');
    setTimeout(() => {
      activeCard.style.display = 'none';
      currentIdx++;
      if (currentIdx >= cards.length) setTimeout(resetStack, 400);
      else refreshStackVisuals();
    }, 400);
  } else {
    activeCard.style.transition = 'transform 0.4s cubic-bezier(0.34,1.56,0.64,1)';
    const tilt = parseFloat(activeCard.dataset.baseTilt) || 0;
    const tx = parseFloat(activeCard.dataset.baseTx) || 0;
    activeCard.style.transform = `rotate(${tilt}deg) translateX(${tx}px)`;
  }
  activeCard = null;
}

function resetStack() {
  currentIdx = 0;
  cards.forEach(c => { c.style.display = ''; c.classList.remove('flying-left','flying-right'); });
  refreshStackVisuals();
}

function updateCounter() {
  let el = document.querySelector('.swipe-counter');
  if (!el) {
    el = document.createElement('div'); el.className = 'swipe-counter';
    document.querySelector('.polaroid-bg').appendChild(el);
  }
  const rem = Math.max(0, cards.length - currentIdx);
  el.textContent = rem > 0 ? `${rem} foto tersisa` : 'semua udah dilihat 💕';
}
</script>
</body>
</html>
